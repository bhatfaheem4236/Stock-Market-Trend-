<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Market Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0d1117;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        .search-box {
            background: #0b2e5f;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            width: 200%;
            max-width: 600px;
        }
        h1 { color: #f2ad0d; }
        #symbolInput {
            background: #0d1117 !important;
            color: white !important;
            border: 1px solid #f0b429;
            outline: none;
        }
        #symbolInput::placeholder { color: #888; }
        .btn-search {
            background: #f0b429;
            color: black;
            font-weight: bold;
            border: none;
        }
        #suggestions {
            display: none;
            background: #161b22;
            border: 1px solid #f0b429;
            border-radius: 8px;
            margin-top: 5px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
        }
        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            color: white;
            border-bottom: 1px solid #30363d;
        }
        .suggestion-item:hover { background: rgba(240,180,41,0.15); }
    </style>
</head>
<body>
<div class="container">
    <div class="search-box">
        <h1>📈 Stock Market Trend Predictor</h1>
        <p style="color:#888;" class="mb-4">Enter a Stock Name to get Live News, Live Prices & AI Prediction</p>
        <form action="/search/" method="GET">
            <div class="input-group input-group-lg">
                <input type="text" name="symbol" id="symbolInput"
                       class="form-control"
                       placeholder="e.g. AAPL, TSLA, GOOGL"
                       required autocomplete="off">
                <button class="btn btn-search" type="submit">Search</button>
            </div>
            <div id="suggestions"></div>
        </form>
        <p style="color:#555; font-size:0.85rem;" class="mt-3">
            Try: AAPL · TSLA · GOOGL · MSFT · NVDA
        </p>
    </div>
</div>

<script>
const stocks = [
    {symbol: "AAPL", name: "Apple"},
    {symbol: "GOOGL", name: "Google"},
    {symbol: "MSFT", name: "Microsoft"},
    {symbol: "TSLA", name: "Tesla"},
    {symbol: "NVDA", name: "Nvidia"},
    {symbol: "META", name: "Meta (Facebook)"},
    {symbol: "AMZN", name: "Amazon"},
    {symbol: "NFLX", name: "Netflix"},
    {symbol: "DIS", name: "Disney"},
    {symbol: "UBER", name: "Uber"},
    {symbol: "SPOT", name: "Spotify"},
    {symbol: "JPM", name: "JPMorgan"},
    {symbol: "BAC", name: "Bank of America"},
];

const input = document.getElementById('symbolInput');
const suggestions = document.getElementById('suggestions');

input.addEventListener('focus', () => showSuggestions(stocks));
input.addEventListener('input', () => {
    const val = input.value.toUpperCase();
    const filtered = stocks.filter(s =>
        s.symbol.includes(val) || s.name.toUpperCase().includes(val)
    );
    showSuggestions(filtered);
});

function showSuggestions(list) {
    if (list.length === 0) { suggestions.style.display = 'none'; return; }
    suggestions.innerHTML = list.map(s =>
        `<div class="suggestion-item" onclick="selectStock('${s.symbol}')">
            <strong style="color:#f0b429">${s.symbol}</strong> — ${s.name}
        </div>`
    ).join('');
    suggestions.style.display = 'block';
}

function selectStock(symbol) {
    input.value = symbol;
    suggestions.style.display = 'none';
}

document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !suggestions.contains(e.target))
        suggestions.style.display = 'none';
});
</script>
</body>
</html>
